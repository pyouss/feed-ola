<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Ola</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.7;
      color: #2d2d2d;
      background: #faf8f5;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin: 40px 0 32px;
      text-align: center;
      color: #333;
    }

    .recipes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .recipe-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .recipe-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }

    .card-banner {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .card-body {
      padding: 16px 20px 20px;
    }

    .card-body h2 {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .card-body p {
      font-size: 0.9rem;
      color: #777;
    }
  </style>
</head>
<body>

  <h1>Feed Ola</h1>

  <div class="recipes-grid">

    <a class="recipe-card" href="burger-pizza-dough-recipe.html">
      <div class="card-banner" style="background: linear-gradient(135deg, #d4a574 0%, #8B4513 50%, #c0392b 100%);">
        🍔
      </div>
      <div class="card-body">
        <h2>Smashed Burger in Pizza Dough</h2>
      </div>
    </a>

    <a class="recipe-card" href="chicken-lentil-curry-recipe.html">
      <div class="card-banner" style="background: linear-gradient(135deg, #f39c12 0%, #d35400 50%, #c0392b 100%);">
        🍛
      </div>
      <div class="card-body">
        <h2>One-Pot Chicken &amp; Red Lentil Curry</h2>
      </div>
    </a>

    <a class="recipe-card" href="chicken-pasta-recipe.html">
      <div class="card-banner" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 50%, #8e3b2e 100%);">
        🍝
      </div>
      <div class="card-body">
        <h2>Protein-Packed Chicken Pasta</h2>
      </div>
    </a>

    <a class="recipe-card" href="protein-chocolate-banana-bowl-recipe.html">
      <div class="card-banner" style="background: linear-gradient(135deg, #4E342E, #6D4C41, #3E2723);">
        🍫
      </div>
      <div class="card-body">
        <h2>Protein Chocolate Banana Bowl</h2>
      </div>
    </a>

  </div>

</body>
</html>

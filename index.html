<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Ola</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.7;
      color: #2d2d2d;
      background: #f8f5f0;
      min-height: 100vh;
    }

    /* ===== HERO HEADER ===== */
    .hero-header {
      position: relative;
      text-align: center;
      padding: 50px 20px 48px;
      background: #faf3eb;
      overflow: hidden;
    }
    .hero-logo {
      width: 160px;
      height: 160px;
      margin: 0 auto 20px;
    }
    .hero-header h1 {
      position: relative;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 3rem;
      font-weight: 900;
      color: #5C3A1E;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .hero-header .tagline {
      position: relative;
      font-size: 0.9rem;
      font-weight: 600;
      color: #8B6F52;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .hero-header .accent-line {
      display: block;
      width: 50px;
      height: 3px;
      background: linear-gradient(90deg, #d4a574, #8B4513);
      margin: 18px auto 0;
      border-radius: 2px;
    }

    /* ===== CONTENT ===== */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 28px;
    }

    /* ===== SEARCH & SORT BAR ===== */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-bar {
      width: 100%;
      padding: 12px 16px 12px 44px;
      font-size: 0.95rem;
      font-family: inherit;
      border: 2px solid #e8ddd0;
      border-radius: 12px;
      background: #fff;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-bar:focus {
      border-color: #8B6F52;
      box-shadow: 0 0 0 3px rgba(139,111,82,0.12);
    }
    .search-bar::placeholder { color: #c4b5a4; }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #c4b5a4;
      pointer-events: none;
    }
    .sort-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      border: 2px solid #e8ddd0;
      border-radius: 12px;
      background: #fff;
      color: #8B6F52;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .sort-btn:hover {
      border-color: #8B6F52;
      background: #faf3eb;
    }
    .sort-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ===== FILTER CHIPS ===== */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .chip {
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      border: 2px solid #e0d5c8;
      border-radius: 50px;
      background: transparent;
      color: #8B6F52;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }
    .chip:hover { border-color: #8B6F52; }
    .chip.active {
      background: #5C3A1E;
      border-color: #5C3A1E;
      color: #fff;
    }

    .no-results {
      text-align: center;
      padding: 48px 20px;
      color: #bba58f;
      font-size: 1rem;
      display: none;
    }
    .no-results.visible { display: block; }

    /* ===== RECIPE CARDS ===== */
    .recipes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    .recipe-card {
      position: relative;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.35s cubic-bezier(.25,.8,.25,1), box-shadow 0.35s cubic-bezier(.25,.8,.25,1);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .recipe-card:hover {
      transform: translateY(-8px) scale(1.015);
      box-shadow: 0 20px 50px rgba(0,0,0,0.14);
    }

    .card-banner {
      position: relative;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-banner .emoji {
      font-size: 4rem;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
      transition: transform 0.35s cubic-bezier(.25,.8,.25,1);
      z-index: 1;
    }
    .recipe-card:hover .emoji {
      transform: scale(1.2) rotate(-5deg);
    }
    .card-banner::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(transparent, rgba(0,0,0,0.15));
    }

    .card-body {
      padding: 20px 22px 24px;
    }

    .card-body h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.4;
      color: #1a1a2e;
    }

    .card-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      background: #f2eeea;
      color: #888;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 0.82rem;
      color: #bba58f;
      letter-spacing: 1px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 500px) {
      .hero-header h1 { font-size: 2.2rem; }
      .hero-header { padding: 36px 16px 36px; }
      .hero-logo { width: 120px; height: 120px; }
      .recipes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="hero-header">
    <div class="hero-logo">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Circle border -->
        <circle cx="100" cy="100" r="90" fill="none" stroke="#6B3F23" stroke-width="5"/>
        <!-- Bear body -->
        <ellipse cx="100" cy="118" rx="52" ry="50" fill="#E8D5B7"/>
        <!-- Left ear -->
        <circle cx="68" cy="52" r="18" fill="#E8D5B7" stroke="#6B3F23" stroke-width="4"/>
        <circle cx="68" cy="52" r="10" fill="#D4B896"/>
        <!-- Right ear -->
        <circle cx="132" cy="52" r="18" fill="#E8D5B7" stroke="#6B3F23" stroke-width="4"/>
        <circle cx="132" cy="52" r="10" fill="#D4B896"/>
        <!-- Head -->
        <circle cx="100" cy="82" r="38" fill="#E8D5B7" stroke="#6B3F23" stroke-width="4"/>
        <!-- Eyes (closed, happy) -->
        <path d="M 82 78 Q 86 73 90 78" fill="none" stroke="#6B3F23" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 110 78 Q 114 73 118 78" fill="none" stroke="#6B3F23" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Nose -->
        <ellipse cx="100" cy="88" rx="5" ry="3.5" fill="#8B6243"/>
        <!-- Smile -->
        <path d="M 94 93 Q 100 99 106 93" fill="none" stroke="#6B3F23" stroke-width="2" stroke-linecap="round"/>
        <!-- Blush -->
        <circle cx="78" cy="88" r="5" fill="#E8B89D" opacity="0.6"/>
        <circle cx="122" cy="88" r="5" fill="#E8B89D" opacity="0.6"/>
        <!-- Left arm -->
        <path d="M 70 120 Q 55 135 65 155" fill="none" stroke="#6B3F23" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Right arm holding bowl -->
        <path d="M 130 120 Q 148 132 140 150" fill="none" stroke="#6B3F23" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Bowl -->
        <ellipse cx="135" cy="148" rx="22" ry="8" fill="#F5E6D0" stroke="#6B3F23" stroke-width="2.5"/>
        <path d="M 113 148 Q 115 170 135 170 Q 155 170 157 148" fill="#F5E6D0" stroke="#6B3F23" stroke-width="2.5"/>
        <!-- Food in bowl -->
        <circle cx="128" cy="145" r="4" fill="#C0392B" opacity="0.7"/>
        <circle cx="138" cy="143" r="3" fill="#27AE60" opacity="0.7"/>
        <circle cx="133" cy="147" r="3.5" fill="#E67E22" opacity="0.7"/>
        <!-- Steam -->
        <path d="M 125 132 Q 122 125 125 118" fill="none" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <path d="M 135 130 Q 132 122 135 114" fill="none" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <path d="M 145 132 Q 142 125 145 118" fill="none" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </svg>
    </div>
    <h1>Feed Ola</h1>
    <div class="tagline">homemade &amp; high protein</div>
    <span class="accent-line"></span>
  </header>

  <main class="content">

    <!-- ===== TIPS LINK ===== -->
    <div style="margin-bottom:36px;">
      <a href="tips.html" style="display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#5C3A1E 0%,#8B5E3C 100%);border-radius:20px;padding:28px 28px;text-decoration:none;color:#fff;box-shadow:0 4px 20px rgba(92,58,30,0.2);transition:transform 0.3s,box-shadow 0.3s;position:relative;overflow:hidden;" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 30px rgba(92,58,30,0.3)'" onmouseout="this.style.transform='';this.style.boxShadow='0 4px 20px rgba(92,58,30,0.2)'">
        <span style="font-size:2.2rem;">💡</span>
        <div>
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:1.2rem;font-weight:700;">Kitchen Tips</div>
          <div style="font-size:0.85rem;opacity:0.7;margin-top:2px;">Nutrition hacks, cooking tricks &amp; good-to-know</div>
        </div>
        <span style="margin-left:auto;font-size:1.3rem;opacity:0.5;">→</span>
      </a>
    </div>

    <div class="section-label">All Recipes</div>

    <!-- ===== SEARCH & SORT ===== -->
    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-bar" type="text" id="searchInput" placeholder="Search recipes...">
      </div>
      <button class="sort-btn" id="sortBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M6 12h12M9 18h6"/></svg>
        <span id="sortLabel">A → Z</span>
      </button>
    </div>

    <!-- ===== FILTER CHIPS ===== -->
    <div class="filters" id="filters">
      <button class="chip active" data-cat="all">All</button>
      <button class="chip" data-cat="comfort-food">Comfort food</button>
      <button class="chip" data-cat="one-pot">One pot</button>
      <button class="chip" data-cat="high-protein">High protein</button>
      <button class="chip" data-cat="basics">Basics</button>
      <button class="chip" data-cat="dessert">Dessert</button>
    </div>

    <div class="recipes-grid" id="recipesGrid"></div>
    <div class="no-results" id="noResults">No recipes found</div>

  </main>

  <div class="footer">Made with love for Ola</div>

<script>
const RECIPES = [
  {
    title: "Smashed Burger in Pizza Dough",
    href: "burger-pizza-dough-recipe.html",
    emoji: "🍔",
    gradient: "linear-gradient(135deg, #d4a574 0%, #8B4513 50%, #c0392b 100%)",
    tag: "comfort-food",
    tagLabel: "Comfort food"
  },
  {
    title: "One-Pot Chicken & Red Lentil Curry",
    href: "chicken-lentil-curry-recipe.html",
    emoji: "🍛",
    gradient: "linear-gradient(135deg, #f39c12 0%, #d35400 50%, #c0392b 100%)",
    tag: "one-pot",
    tagLabel: "One pot"
  },
  {
    title: "Protein-Packed Chicken Pasta",
    href: "chicken-pasta-recipe.html",
    emoji: "🍝",
    gradient: "linear-gradient(135deg, #e74c3c 0%, #c0392b 50%, #8e3b2e 100%)",
    tag: "high-protein",
    tagLabel: "High protein"
  },
  {
    title: "Protein Chocolate Banana Bowl",
    href: "protein-chocolate-banana-bowl-recipe.html",
    emoji: "🍫",
    gradient: "linear-gradient(135deg, #4E342E, #6D4C41, #3E2723)",
    tag: "dessert",
    tagLabel: "Dessert"
  },
  {
    title: "Oven Chicken Breast — The Basics",
    href: "oven-chicken-breast-recipe.html",
    emoji: "🍗",
    gradient: "linear-gradient(135deg, #f5c77e 0%, #d4915a 50%, #a0522d 100%)",
    tag: "basics",
    tagLabel: "Basics"
  }
];

const SORT_MODES = [
  { label: "A → Z",  fn: (a, b) => a.title.localeCompare(b.title) },
  { label: "Z → A",  fn: (a, b) => b.title.localeCompare(a.title) },
  { label: "Default", fn: null }
];

let sortIndex = 2; // start at Default
let activeCategory = 'all';

const grid = document.getElementById('recipesGrid');
const searchInput = document.getElementById('searchInput');
const sortBtn = document.getElementById('sortBtn');
const sortLabel = document.getElementById('sortLabel');
const filtersEl = document.getElementById('filters');
const noResults = document.getElementById('noResults');

function render() {
  const query = searchInput.value.toLowerCase().trim();
  let filtered = RECIPES.filter(r => {
    const matchesCat = activeCategory === 'all' || r.tag === activeCategory;
    const matchesSearch = !query ||
      r.title.toLowerCase().includes(query) ||
      r.tagLabel.toLowerCase().includes(query);
    return matchesCat && matchesSearch;
  });

  const mode = SORT_MODES[sortIndex];
  if (mode.fn) filtered.sort(mode.fn);

  grid.innerHTML = '';
  filtered.forEach(r => {
    const safeTitle = r.title.replace(/&/g, '&amp;');
    grid.insertAdjacentHTML('beforeend', `
      <a class="recipe-card" href="${r.href}">
        <div class="card-banner" style="background: ${r.gradient};">
          <span class="emoji">${r.emoji}</span>
        </div>
        <div class="card-body">
          <h2>${safeTitle}</h2>
          <span class="card-tag">${r.tagLabel}</span>
        </div>
      </a>
    `);
  });

  noResults.classList.toggle('visible', filtered.length === 0);
}

// Search
searchInput.addEventListener('input', render);

// Sort
sortBtn.addEventListener('click', () => {
  sortIndex = (sortIndex + 1) % SORT_MODES.length;
  sortLabel.textContent = SORT_MODES[sortIndex].label;
  render();
});

// Filter chips
filtersEl.addEventListener('click', (e) => {
  if (!e.target.classList.contains('chip')) return;
  filtersEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  activeCategory = e.target.dataset.cat;
  render();
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchInput.value = '';
    searchInput.blur();
    render();
  }
});

render();
</script>

</body>
</html>

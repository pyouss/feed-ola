<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed Ola</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.7;
      color: #2d2d2d;
      background: #f8f5f0;
      min-height: 100vh;
    }

    /* ===== HERO HEADER ===== */
    .hero-header {
      position: relative;
      text-align: center;
      padding: 80px 20px 60px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      overflow: hidden;
    }
    .hero-header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 70%, rgba(228,134,84,0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 30%, rgba(196,69,54,0.12) 0%, transparent 50%);
      animation: drift 20s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-30px, 20px) rotate(3deg); }
    }
    .hero-header h1 {
      position: relative;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    .hero-header .tagline {
      position: relative;
      font-size: 1.05rem;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .hero-header .accent-line {
      display: block;
      width: 50px;
      height: 3px;
      background: linear-gradient(90deg, #e48454, #c44536);
      margin: 20px auto 0;
      border-radius: 2px;
    }

    /* ===== CONTENT ===== */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 28px;
    }

    /* ===== RECIPE CARDS ===== */
    .recipes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    .recipe-card {
      position: relative;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.35s cubic-bezier(.25,.8,.25,1), box-shadow 0.35s cubic-bezier(.25,.8,.25,1);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .recipe-card:hover {
      transform: translateY(-8px) scale(1.015);
      box-shadow: 0 20px 50px rgba(0,0,0,0.14);
    }

    .card-banner {
      position: relative;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-banner .emoji {
      font-size: 4rem;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
      transition: transform 0.35s cubic-bezier(.25,.8,.25,1);
      z-index: 1;
    }
    .recipe-card:hover .emoji {
      transform: scale(1.2) rotate(-5deg);
    }
    .card-banner::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(transparent, rgba(0,0,0,0.15));
    }

    .card-body {
      padding: 20px 22px 24px;
    }

    .card-body h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.4;
      color: #1a1a2e;
    }

    .card-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      background: #f2eeea;
      color: #888;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 0.82rem;
      color: #bbb;
      letter-spacing: 1px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 500px) {
      .hero-header h1 { font-size: 2.4rem; }
      .hero-header { padding: 60px 16px 44px; }
      .recipes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="hero-header">
    <h1>Feed Ola</h1>
    <div class="tagline">homemade &amp; high protein</div>
    <span class="accent-line"></span>
  </header>

  <main class="content">
    <div class="section-label">All Recipes</div>

    <div class="recipes-grid">

      <a class="recipe-card" href="burger-pizza-dough-recipe.html">
        <div class="card-banner" style="background: linear-gradient(135deg, #d4a574 0%, #8B4513 50%, #c0392b 100%);">
          <span class="emoji">🍔</span>
        </div>
        <div class="card-body">
          <h2>Smashed Burger in Pizza Dough</h2>
          <span class="card-tag">Comfort food</span>
        </div>
      </a>

      <a class="recipe-card" href="chicken-lentil-curry-recipe.html">
        <div class="card-banner" style="background: linear-gradient(135deg, #f39c12 0%, #d35400 50%, #c0392b 100%);">
          <span class="emoji">🍛</span>
        </div>
        <div class="card-body">
          <h2>One-Pot Chicken &amp; Red Lentil Curry</h2>
          <span class="card-tag">One pot</span>
        </div>
      </a>

      <a class="recipe-card" href="chicken-pasta-recipe.html">
        <div class="card-banner" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 50%, #8e3b2e 100%);">
          <span class="emoji">🍝</span>
        </div>
        <div class="card-body">
          <h2>Protein-Packed Chicken Pasta</h2>
          <span class="card-tag">High protein</span>
        </div>
      </a>

      <a class="recipe-card" href="protein-chocolate-banana-bowl-recipe.html">
        <div class="card-banner" style="background: linear-gradient(135deg, #4E342E, #6D4C41, #3E2723);">
          <span class="emoji">🍫</span>
        </div>
        <div class="card-body">
          <h2>Protein Chocolate Banana Bowl</h2>
          <span class="card-tag">Dessert</span>
        </div>
      </a>

    </div>
  </main>

  <div class="footer">Made with love for Ola</div>

</body>
</html>
